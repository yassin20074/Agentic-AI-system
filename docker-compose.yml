version: '3.8'

services: 
  db:
    image: postgres:15-alpine
    container_name: agent_postgres_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-user} #In a file .env 
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-agent_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .
    container_name: agentic_api_service
    restart: always
    depends_on:
      - db
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-user}:${POSTGRES_PASSWORD:-password}@db:5432/${POSTGRES_DB:-agent_db}
    
volumes:
  postgres_data:
